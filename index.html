<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkçe Cümle — Generador de Frases</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:        #0f0f13;
    --surface:   #17171e;
    --border:    #2a2a38;
    --red:       #e63e3e;
    --red-dim:   #7a1f1f;
    --cream:     #f0ebe0;
    --muted:     #6b6b80;
    --success:   #3ecf8e;
    --tag-bg:    #1e1e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  h1 span {
    color: var(--red);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    padding: 14px;
    resize: none;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--red); }
  textarea::placeholder { color: var(--muted); }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .ex-chip {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .ex-chip:active, .ex-chip:hover {
    border-color: var(--red);
    color: var(--cream);
  }

  button#traducir {
    width: 100%;
    background: var(--red);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }

  button#traducir:disabled { opacity: 0.45; cursor: not-allowed; }
  button#traducir:active { opacity: 0.85; }

  #resultado { display: none; }

  .turco-frase {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--cream);
    margin-bottom: 6px;
  }

  .transliteracion {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    font-style: italic;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .seccion-titulo {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 12px;
  }

  .pieza {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .pieza-token {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--success);
    background: rgba(62,207,142,0.08);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    margin-top: 1px;
  }

  .pieza-info {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .pieza-info strong {
    color: var(--cream);
    font-weight: 600;
  }

  .regla-tag {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    padding: 1px 6px;
    color: var(--red);
    font-family: 'IBM Plex Mono', monospace;
    margin-left: 4px;
    vertical-align: middle;
  }

  .nota {
    background: rgba(230,62,62,0.07);
    border-left: 3px solid var(--red-dim);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 4px;
  }

  .spinner {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner.visible { display: block; }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  .error-msg {
    background: rgba(230,62,62,0.1);
    border: 1px solid var(--red-dim);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: #f08080;
    display: none;
  }

  .nueva-frase {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .nueva-frase:hover { border-color: var(--red); color: var(--cream); }
</style>
</head>
<body>

<header>
  <div class="logo">Türkçe Dersi</div>
  <h1>Generador de <span>Frases</span></h1>
  <p class="subtitle">Escribe en español · Recibe la traducción en turco con explicación</p>
</header>

<div class="card">
  <label>Frase en español</label>
  <textarea id="input" placeholder="Ej: Soy un abogado rápido pero no disciplinado"></textarea>
  <div class="examples">
    <div class="ex-chip" onclick="setEj(this)">Soy abogado</div>
    <div class="ex-chip" onclick="setEj(this)">No soy perezosa</div>
    <div class="ex-chip" onclick="setEj(this)">Él es médico honesto</div>
    <div class="ex-chip" onclick="setEj(this)">Soy trabajadora pero no disciplinada</div>
    <div class="ex-chip" onclick="setEj(this)">Eres valiente pero tacaño</div>
    <div class="ex-chip" onclick="setEj(this)">Somos estudiantes</div>
  </div>
</div>

<button id="traducir" onclick="traducir()">Traducir al turco →</button>

<div class="spinner" id="spinner">
  <span class="dot-anim">Analizando y traduciendo</span>
</div>

<div class="error-msg" id="error"></div>

<div class="card" id="resultado">
  <div class="seccion-titulo">Traducción</div>
  <div class="turco-frase" id="frase-turca"></div>
  <div class="transliteracion" id="transliteracion"></div>

  <div class="divider"></div>

  <div class="seccion-titulo">Análisis morfológico</div>
  <div id="analisis"></div>

  <div id="nota-box"></div>

  <button class="nueva-frase" onclick="nuevaFrase()">← Nueva frase</button>
</div>

<script>
const SYSTEM = `Eres un asistente de turco para hispanohablantes, especializado en el nivel inicial de un curso universitario. 
Tu tarea es traducir frases simples del español al turco aplicando EXACTAMENTE las reglas gramaticales del curso.

REGLAS QUE DEBES APLICAR:

1. ARMONÍA VOCÁLICA (2 vías y 4 vías):
   - Armonía 2 vías: si la última vocal de la palabra es e/i/ö/ü → sufijo con "e"; si es a/ı/o/u → sufijo con "a"
   - Armonía 4 vías: elige ı/i/u/ü según la última vocal de la raíz

2. REGLA KETÇAP-FISTIKÇI ŞAHAP (mutación consonántica):
   - Las consonantes f,s,t,k,ç,ş,h,p al final de una palabra pueden sonorizarse antes de un sufijo que empieza en vocal
   - Mutación: p→b, ç→c, t→d, k→ğ
   - PERO: esta mutación NO ocurre siempre; las palabras prestadas (doktor, pilot, etc.) generalmente NO mutan

3. VERBO İMEK (ser/estar) — sufijos de persona:
   - Ben (yo):   palabra + (y)⁴m   → si acaba en vocal: +y+arm4+m; si acaba en consonante: +arm4+m
   - Biz (nos):  palabra + (y)⁴z   → misma lógica
   - Sen (tú):   palabra + s⁴n     → siempre +s+arm4+n (nunca muta, s es el buffer)
   - Siz (vos):  palabra + s⁴n⁴z
   - O (él/ella): palabra + d⁴r    → +d+arm4+r (si acaba en sorda: +t+arm4+r)
   - Onlar:      palabra + d⁴rl²r  → Onlar plural + İMEK de O

4. NEGATIVO con değil:
   - "No soy X" = X + değil + sufijo de persona de İMEK (usando vocales de "değil", que tiene "i")
   - değilim / değiliz / değilsin / değilsiniz / değildir / değildirler

5. CONJUNCIONES: ama/fakat/ancak = pero

6. PLURAL: sustantivo + lar/ler (armonía 2 vías)

7. ORDEN DE PALABRAS EN TURCO:
   - En frases con İMEK: Sujeto + (adjetivos) + sustantivo/adjetivo predicado + İMEK
   - Los adjetivos van ANTES del sustantivo que modifican
   - "Soy abogado rápido" = "Hızlı bir avukattım" pero para İMEK nominal: "Ben hızlı bir avukadım"
   - Para "Soy X pero no Y": X + İMEK + ama/fakat + değil + İMEK
   - Ejemplo: "Soy trabajador pero no disciplinado" = "Çalışkanım ama disiplinli değilim"

VOCABULARIO DEL CURSO (usa estas palabras, no otras):
Profesiones: avukat(abogado), doktor(médico), öğretmen(profesor), öğrenci(estudiante), asker(soldado), aşçı(cocinero), bakkal(tendero), balıkçı(pescador), bankacı(banquero), berber(barbero), çiftçi(agricultor), çoban(pastor), elektrikçi(electricista), fırıncı(panadero), garson(camarero), gazeteci(periodista), gemici(marinero), hademe(conserje), hâkim(juez), hemşire(enfermero), hoca(maestro), işçi(obrero), kasap(carnicero), kuaför(peluquero), kuyumcu(joyero), manav(verdulero), marangoz(carpintero), müdür(director), oyuncu(actor), pilot(piloto), polis(policía), memur(funcionario), rehber(guía), ressam(pintor), sanatçı(artista), sekreter(secretario), şâir(poeta), tamirci(mecánico), teknisyen(técnico), tercüman(traductor), terzi(sastre), veteriner(veterinario), yazar(escritor), fıstıkçı(vendedor de pistachos)
Adjetivos: atak(audaz), çekingen(tímido), becerikli(hábil), beceriksiz(torpe), çalışkan(trabajador), tembel(perezoso), dikkatli(prudente), dikkatsiz(imprudente), disiplinli(disciplinado), disiplinsiz(indisciplinado), güvenilir(confiable), ikiyüzlü(hipócrita), samimi(sincero), kirli(sucio), temiz(limpio), özenli(cuidadoso), özensiz(descuidado), titiz(meticuloso), terbiyeli(educado), terbiyesiz(maleducado), anlayışlı(comprensivo), merhametli(piadoso), merhametsiz(despiadado), cömert(generoso), cimri(tacaño), kibirli(arrogante), mütevâzi(humilde), dürüst(honesto), cesur(valiente), korkak(cobarde), hızlı(rápido), yavaş(lento), yorgun(cansado), üzgün(triste)
Pronombres: ben(yo), sen(tú), o(él/ella), biz(nosotros), siz(vosotros/usted), onlar(ellos)
bir = un/una (artículo indefinido)

RESPONDE SIEMPRE EN ESTE FORMATO JSON EXACTO (sin markdown, sin texto extra):
{
  "frase_turca": "la frase completa en turco",
  "transliteracion": "pronunciación aproximada para hispanohablantes",
  "piezas": [
    {
      "token": "palabra en turco",
      "explicacion": "qué es esta palabra/sufijo",
      "regla": "regla gramatical aplicada (o null si es vocabulario base)"
    }
  ],
  "nota": "observación útil sobre la frase o construcción (puede ser null)"
}`;

function setEj(el) {
  document.getElementById('input').value = el.textContent;
}

function nuevaFrase() {
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('input').value = '';
  document.getElementById('input').focus();
}

async function traducir() {
  const frase = document.getElementById('input').value.trim();
  if (!frase) return;

  const btn = document.getElementById('traducir');
  const spinner = document.getElementById('spinner');
  const errorDiv = document.getElementById('error');
  const resultado = document.getElementById('resultado');

  btn.disabled = true;
  spinner.classList.add('visible');
  errorDiv.style.display = 'none';
  resultado.style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: frase }]
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Frase principal
    document.getElementById('frase-turca').textContent = parsed.frase_turca;
    document.getElementById('transliteracion').textContent = parsed.transliteracion || '';

    // Análisis morfológico
    const analisisDiv = document.getElementById('analisis');
    analisisDiv.innerHTML = '';
    (parsed.piezas || []).forEach(p => {
      const div = document.createElement('div');
      div.className = 'pieza';
      div.innerHTML = `
        <div class="pieza-token">${p.token}</div>
        <div class="pieza-info">
          <strong>${p.explicacion}</strong>
          ${p.regla ? `<span class="regla-tag">${p.regla}</span>` : ''}
        </div>`;
      analisisDiv.appendChild(div);
    });

    // Nota
    const notaBox = document.getElementById('nota-box');
    if (parsed.nota) {
      notaBox.innerHTML = `<div class="divider"></div><div class="nota">💡 ${parsed.nota}</div>`;
    } else {
      notaBox.innerHTML = '';
    }

    resultado.style.display = 'block';
    resultado.scrollIntoView({ behavior: 'smooth' });

  } catch (err) {
    errorDiv.textContent = 'No se pudo traducir. Intenta de nuevo.';
    errorDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    spinner.classList.remove('visible');
  }
}

// Enter para traducir
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); traducir(); }
});
</script>
</body>
</html>
